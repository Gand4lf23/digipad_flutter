<svg width="80" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Video screen background -->
  <rect x="10" y="15" width="60" height="40" rx="5" fill="#2c3e50" stroke="#1a252f" stroke-width="2"/>
  
  <!-- Screen -->
  <rect x="13" y="18" width="54" height="34" rx="3" fill="#34495e"/>
  
  <!-- Play button circle -->
  <circle cx="40" cy="35" r="12" fill="url(#playGrad)" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Play triangle -->
  <path d="M 35 28 L 35 42 L 47 35 Z" fill="#2c3e50"/>
  
  <!-- Video stand -->
  <rect x="35" y="55" width="10" height="8" fill="#34495e"/>
  <rect x="25" y="63" width="30" height="4" rx="2" fill="#2c3e50"/>
  
  <!-- Screen reflection -->
  <rect x="13" y="18" width="54" height="8" rx="3" fill="#ffffff" opacity="0.1"/>
  
  <!-- Corner indicators -->
  <circle cx="18" cy="23" r="1.5" fill="#e74c3c"/>
  <circle cx="62" cy="23" r="1.5" fill="#27ae60"/>
</svg>