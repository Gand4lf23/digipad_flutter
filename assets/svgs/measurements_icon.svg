<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rulerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Main ruler body -->
  <rect x="15" y="40" width="70" height="20" rx="3" fill="url(#rulerGrad)" stroke="#d35400" stroke-width="2"/>
  
  <!-- Measurement marks -->
  <line x1="20" y1="35" x2="20" y2="45" stroke="#2c3e50" stroke-width="2"/>
  <line x1="25" y1="37" x2="25" y2="43" stroke="#2c3e50" stroke-width="1"/>
  <line x1="30" y1="35" x2="30" y2="45" stroke="#2c3e50" stroke-width="2"/>
  <line x1="35" y1="37" x2="35" y2="43" stroke="#2c3e50" stroke-width="1"/>
  <line x1="40" y1="35" x2="40" y2="45" stroke="#2c3e50" stroke-width="2"/>
  <line x1="45" y1="37" x2="45" y2="43" stroke="#2c3e50" stroke-width="1"/>
  <line x1="50" y1="35" x2="50" y2="45" stroke="#2c3e50" stroke-width="2"/>
  <line x1="55" y1="37" x2="55" y2="43" stroke="#2c3e50" stroke-width="1"/>
  <line x1="60" y1="35" x2="60" y2="45" stroke="#2c3e50" stroke-width="2"/>
  <line x1="65" y1="37" x2="65" y2="43" stroke="#2c3e50" stroke-width="1"/>
  <line x1="70" y1="35" x2="70" y2="45" stroke="#2c3e50" stroke-width="2"/>
  <line x1="75" y1="37" x2="75" y2="43" stroke="#2c3e50" stroke-width="1"/>
  <line x1="80" y1="35" x2="80" y2="45" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Bottom measurement marks -->
  <line x1="20" y1="55" x2="20" y2="65" stroke="#2c3e50" stroke-width="2"/>
  <line x1="30" y1="55" x2="30" y2="65" stroke="#2c3e50" stroke-width="2"/>
  <line x1="40" y1="55" x2="40" y2="65" stroke="#2c3e50" stroke-width="2"/>
  <line x1="50" y1="55" x2="50" y2="65" stroke="#2c3e50" stroke-width="2"/>
  <line x1="60" y1="55" x2="60" y2="65" stroke="#2c3e50" stroke-width="2"/>
  <line x1="70" y1="55" x2="70" y2="65" stroke="#2c3e50" stroke-width="2"/>
  <line x1="80" y1="55" x2="80" y2="65" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Pupil measurement indicators -->
  <circle cx="35" cy="25" r="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="65" cy="25" r="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  
  <!-- Distance measurement line -->
  <line x1="35" y1="25" x2="65" y2="25" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,2"/>
  
  <!-- Measurement arrows -->
  <path d="M 33 23 L 37 25 L 33 27" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <path d="M 67 23 L 63 25 L 67 27" fill="none" stroke="#e74c3c" stroke-width="2"/>
  
  <!-- Digital display -->
  <rect x="40" y="75" width="20" height="10" rx="2" fill="#2c3e50" stroke="#34495e" stroke-width="1"/>
  <text x="50" y="82" text-anchor="middle" fill="#1abc9c" font-family="monospace" font-size="6">63mm</text>
</svg>