<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lensGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1abc9c;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#16a085;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0e6b5d;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="innerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  <!-- Contact lens outer ring -->
  <circle cx="50" cy="50" r="35" fill="url(#lensGrad)" stroke="#0e6b5d" stroke-width="2"/>
  <!-- Inner transparent area -->
  <circle cx="50" cy="50" r="28" fill="url(#innerGrad)"/>
  <!-- Lens pattern rings -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#16a085" stroke-width="1" opacity="0.6"/>
  <circle cx="50" cy="50" r="16" fill="none" stroke="#16a085" stroke-width="1" opacity="0.4"/>
  <circle cx="50" cy="50" r="10" fill="none" stroke="#16a085" stroke-width="1" opacity="0.3"/>
  
  <!-- Center pupil area -->
  <circle cx="50" cy="50" r="8" fill="#2c3e50" opacity="0.7"/>
  
  <!-- Highlight reflection -->
  <ellipse cx="45" cy="45" rx="8" ry="12" fill="#ffffff" opacity="0.4"/>
  
  <!-- Lens edge highlight -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  
  <!-- Small decorative dots around -->
  <circle cx="25" cy="25" r="2" fill="#1abc9c" opacity="0.6"/>
  <circle cx="75" cy="25" r="2" fill="#1abc9c" opacity="0.6"/>
  <circle cx="25" cy="75" r="2" fill="#1abc9c" opacity="0.6"/>
  <circle cx="75" cy="75" r="2" fill="#1abc9c" opacity="0.6"/>
</svg>