<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8e44ad;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#663399;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  <!-- 3D Cube outline -->
  <path d="M 25 35 L 50 25 L 75 35 L 75 65 L 50 75 L 25 65 Z" fill="none" stroke="#8e44ad" stroke-width="2"/>
  <path d="M 25 35 L 40 20 L 65 20 L 75 35" fill="none" stroke="#8e44ad" stroke-width="2"/>
  <path d="M 50 25 L 65 20" stroke="#8e44ad" stroke-width="2"/>
  <path d="M 75 35 L 90 25 L 90 55 L 75 65" fill="none" stroke="#8e44ad" stroke-width="2"/>
  
  <!-- Main lens -->
  <circle cx="50" cy="50" r="20" fill="url(#lensGrad)" stroke="#663399" stroke-width="2"/>
  <!-- Inner lens reflection -->
  <circle cx="50" cy="50" r="15" fill="url(#centerGrad)"/>
  <!-- Center focal point -->
  <circle cx="50" cy="50" r="3" fill="#2c3e50"/>
  
  <!-- AR markers -->
  <rect x="15" y="15" width="8" height="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <rect x="77" y="15" width="8" height="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <rect x="15" y="77" width="8" height="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <rect x="77" y="77" width="8" height="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  
  <!-- 3D depth lines -->
  <path d="M 35 35 L 30 30 M 65 35 L 70 30 M 35 65 L 30 70 M 65 65 L 70 70" stroke="#9b59b6" stroke-width="1" opacity="0.7"/>
</svg>