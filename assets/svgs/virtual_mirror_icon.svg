<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Camera body -->
  <rect x="15" y="25" width="70" height="50" rx="8" fill="url(#cameraGrad)" stroke="#1a252f" stroke-width="2"/>
  <!-- Lens outer ring -->
  <circle cx="50" cy="50" r="18" fill="#34495e" stroke="#1a252f" stroke-width="2"/>
  <!-- Lens inner -->
  <circle cx="50" cy="50" r="12" fill="#2c3e50" stroke="#1a252f" stroke-width="1"/>
  <!-- Lens center -->
  <circle cx="50" cy="50" r="6" fill="#1a252f"/>
  <!-- Flash -->
  <rect x="70" y="30" width="8" height="6" rx="2" fill="#ecf0f1"/>
  <!-- Viewfinder -->
  <rect x="35" y="15" width="30" height="8" rx="4" fill="url(#cameraGrad)" stroke="#1a252f" stroke-width="1"/>
  <!-- Mirror reflection effect -->
  <path d="M 25 35 Q 50 25 75 35 Q 50 45 25 35" fill="#ffffff" opacity="0.2"/>
</svg>