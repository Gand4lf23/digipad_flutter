<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Eye chart background -->
  <rect x="20" y="15" width="60" height="70" rx="5" fill="url(#chartGrad)" stroke="#bdc3c7" stroke-width="2"/>
  
  <!-- Eye chart lines (getting smaller) -->
  <!-- Line 1 - Largest -->
  <rect x="25" y="20" width="50" height="6" fill="#2c3e50"/>
  
  <!-- Line 2 -->
  <rect x="30" y="30" width="15" height="4" fill="#2c3e50"/>
  <rect x="50" y="30" width="15" height="4" fill="#2c3e50"/>
  
  <!-- Line 3 -->
  <rect x="28" y="38" width="8" height="3" fill="#2c3e50"/>
  <rect x="40" y="38" width="8" height="3" fill="#2c3e50"/>
  <rect x="52" y="38" width="8" height="3" fill="#2c3e50"/>
  <rect x="64" y="38" width="8" height="3" fill="#2c3e50"/>
  
  <!-- Line 4 -->
  <rect x="30" y="45" width="6" height="2.5" fill="#2c3e50"/>
  <rect x="40" y="45" width="6" height="2.5" fill="#2c3e50"/>
  <rect x="50" y="45" width="6" height="2.5" fill="#2c3e50"/>
  <rect x="60" y="45" width="6" height="2.5" fill="#2c3e50"/>
  
  <!-- Line 5 -->
  <rect x="32" y="51" width="4" height="2" fill="#2c3e50"/>
  <rect x="40" y="51" width="4" height="2" fill="#2c3e50"/>
  <rect x="48" y="51" width="4" height="2" fill="#2c3e50"/>
  <rect x="56" y="51" width="4" height="2" fill="#2c3e50"/>
  <rect x="64" y="51" width="4" height="2" fill="#2c3e50"/>
  
  <!-- Line 6 - Smallest -->
  <rect x="30" y="57" width="3" height="1.5" fill="#2c3e50"/>
  <rect x="36" y="57" width="3" height="1.5" fill="#2c3e50"/>
  <rect x="42" y="57" width="3" height="1.5" fill="#2c3e50"/>
  <rect x="48" y="57" width="3" height="1.5" fill="#2c3e50"/>
  <rect x="54" y="57" width="3" height="1.5" fill="#2c3e50"/>
  <rect x="60" y="57" width="3" height="1.5" fill="#2c3e50"/>
  <rect x="66" y="57" width="3" height="1.5" fill="#2c3e50"/>
  
  <!-- Vision line indicators -->
  <text x="85" y="25" fill="#e74c3c" font-family="Arial" font-size="8" font-weight="bold">20/200</text>
  <text x="85" y="35" fill="#f39c12" font-family="Arial" font-size="7">20/100</text>
  <text x="85" y="43" fill="#f1c40f" font-family="Arial" font-size="6">20/70</text>
  <text x="85" y="50" fill="#2ecc71" font-family="Arial" font-size="5">20/40</text>
  <text x="85" y="56" fill="#27ae60" font-family="Arial" font-size="4">20/30</text>
  <text x="85" y="61" fill="#16a085" font-family="Arial" font-size="3">20/20</text>
  
  <!-- Pointer/indicator -->
  <path d="M 15 45 L 20 47.5 L 15 50 Z" fill="#e74c3c"/>
  
  <!-- Eye symbol -->
  <ellipse cx="50" cy="75" rx="12" ry="6" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <circle cx="50" cy="75" r="4" fill="#2c3e50"/>
  <circle cx="48" cy="73" r="1.5" fill="#ffffff"/>
</svg>