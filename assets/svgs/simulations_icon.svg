<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f4e79;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="pupilGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Eye shape -->
  <ellipse cx="50" cy="50" rx="40" ry="25" fill="url(#eyeGrad)" stroke="#1a252f" stroke-width="2"/>
  <!-- Iris -->
  <circle cx="50" cy="50" r="15" fill="#2980b9" stroke="#1a252f" stroke-width="1"/>
  <!-- Pupil -->
  <circle cx="50" cy="50" r="8" fill="url(#pupilGrad)"/>
  <!-- Light reflection -->
  <circle cx="47" cy="47" r="3" fill="#ffffff" opacity="0.8"/>
  <!-- Vision rays -->
  <path d="M 20 35 L 10 25 M 20 50 L 5 50 M 20 65 L 10 75" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <path d="M 80 35 L 90 25 M 80 50 L 95 50 M 80 65 L 90 75" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <!-- AR grid overlay -->
  <path d="M 30 30 L 70 30 M 30 70 L 70 70 M 30 30 L 30 70 M 70 30 L 70 70" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
</svg>