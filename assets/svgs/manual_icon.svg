<svg width="80" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecf0f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Book spine -->
  <rect x="15" y="15" width="8" height="50" rx="2" fill="url(#bookGrad)" stroke="#1a252f" stroke-width="1"/>
  
  <!-- Book cover -->
  <rect x="23" y="15" width="40" height="50" rx="3" fill="url(#bookGrad)" stroke="#1a252f" stroke-width="2"/>
  
  <!-- Book pages -->
  <rect x="25" y="17" width="36" height="46" rx="2" fill="url(#pageGrad)" stroke="#bdc3c7" stroke-width="1"/>
  
  <!-- Page lines -->
  <line x1="30" y1="25" x2="55" y2="25" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="30" y1="30" x2="55" y2="30" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="30" y1="35" x2="50" y2="35" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="30" y1="40" x2="55" y2="40" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="30" y1="45" x2="45" y2="45" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="30" y1="50" x2="55" y2="50" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="30" y1="55" x2="50" y2="55" stroke="#7f8c8d" stroke-width="1"/>
  
  <!-- Book title area -->
  <rect x="27" y="19" width="32" height="8" fill="#2c3e50" opacity="0.1"/>
  
  <!-- Bookmark -->
  <rect x="55" y="15" width="4" height="20" fill="#e74c3c"/>
  <path d="M 55 35 L 57 32 L 59 35 Z" fill="#e74c3c"/>
</svg>